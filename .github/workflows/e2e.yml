name: E2E tests

# Click-through tests with a real headless browser (Playwright). Runs on every
# push to main against the live site, and on-demand via "Run workflow" where you
# can point at any URL and optionally exercise the signup/persistence path.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_url:
        description: "Base URL to test"
        required: true
        default: "https://8s.rodeo"

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run E2E
        env:
          BASE_URL: ${{ github.event.inputs.base_url || 'https://8s.rodeo' }}
          ART_INGEST_TOKEN: ${{ secrets.ART_INGEST_TOKEN || 'rowel-8s-ingest-a7f3c9e1' }}
        run: npx playwright test --project=desktop --project=mobile
      - name: Upload report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
